<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MMA · Project Updater</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #080c14; --surface: #0f1624; --border: rgba(255,255,255,0.07);
    --accent: #00e5ff; --accent2: #7c3aed; --text: #e8edf5;
    --muted: rgba(232,237,245,0.45); --success: #00e096; --error: #ff4d6d; --warn: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%); pointer-events: none; }
  body::after { content: ''; position: fixed; bottom: -200px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%); pointer-events: none; }
  .card { width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; position: relative; z-index: 1; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
  .header { text-align: center; margin-bottom: 36px; }
  .logo { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--accent2), #4f1da8); font-size: 1.5rem; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
  h1 { font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 6px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .label-row label { margin-bottom: 0; }
  .free-badge { font-size: 0.65rem; font-weight: 700; background: rgba(0,224,150,0.15); color: var(--success); border: 1px solid rgba(0,224,150,0.3); border-radius: 20px; padding: 2px 8px; letter-spacing: 0.08em; }
  input[type="password"] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: rgba(0,229,255,0.4); }
  .hint { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }
  .hint a { color: var(--accent); text-decoration: none; }
  .site-btns { display: flex; gap: 10px; }
  .site-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
  .site-btn.active { border-color: var(--accent); background: rgba(0,229,255,0.08); color: var(--accent); }
  .dropzone { border: 2px dashed rgba(0,229,255,0.2); border-radius: 14px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.25s; background: rgba(0,229,255,0.02); }
  .dropzone:hover, .dropzone.drag { border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.05); }
  .dropzone.has-file { border-color: rgba(0,229,255,0.4); background: rgba(0,229,255,0.06); }
  .drop-icon { font-size: 2rem; margin-bottom: 10px; }
  .drop-text { color: var(--muted); font-size: 0.875rem; }
  .drop-text strong { color: var(--accent); font-weight: 500; }
  #fileInput { display: none; }
  .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #00e5ff, #0099cc); color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 24px rgba(0,229,255,0.25); margin-top: 8px; }
  .btn-main:hover { transform: translateY(-1px); }
  .btn-main:disabled { background: rgba(255,255,255,0.08); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-main.success { background: linear-gradient(135deg, #00e096, #00a86b); }
  .terminal { margin-top: 20px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; padding: 16px; max-height: 220px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; }
  .log-line { padding: 3px 0; display: flex; gap: 8px; }
  .log-line .ts { color: rgba(255,255,255,0.2); flex-shrink: 0; }
  .log-info { color: rgba(255,255,255,0.65); } .log-success { color: var(--success); } .log-error { color: var(--error); } .log-warn { color: var(--warn); } .log-ai { color: var(--accent); }
  .preview { margin-top: 16px; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15); border-radius: 12px; padding: 16px 18px; }
  .preview-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .preview-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; margin-bottom: 4px; }
  .preview-desc { color: var(--muted); font-size: 0.82rem; line-height: 1.6; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .foot-note { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.72rem; margin-top: 20px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sites-result { display: flex; gap: 10px; margin-top: 14px; }
  .site-result-badge { flex: 1; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.82rem; font-weight: 600; font-family: 'Syne', sans-serif; }
  .site-result-badge.ok { background: rgba(0,224,150,0.12); color: var(--success); border: 1px solid rgba(0,224,150,0.2); }
  .site-result-badge.fail { background: rgba(255,77,109,0.12); color: var(--error); border: 1px solid rgba(255,77,109,0.2); }
  .site-result-badge.skip { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🚀</div>
    <h1>Project Updater</h1>
    <p class="subtitle">Upload PDF → clones your card style → pushes to GitHub</p>
  </div>

  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_..." autocomplete="off"/>
  </div>

  <div class="field">
    <div class="label-row">
      <label>Groq API Key</label>
      <span class="free-badge">✅ FREE</span>
    </div>
    <input type="password" id="groqKey" placeholder="gsk_..." autocomplete="off"/>
    <p class="hint">Get free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
  </div>

  <hr class="divider"/>

  <div class="field">
    <label>Target Site</label>
    <div class="site-btns">
      <button class="site-btn" data-site="portfolio" onclick="toggleSite('portfolio')">Portfolio</button>
      <button class="site-btn" data-site="freelance" onclick="toggleSite('freelance')">Freelance</button>
      <button class="site-btn active" data-site="both" onclick="toggleSite('both')">Both</button>
    </div>
  </div>

  <div class="field">
    <label>Project PDF</label>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="drop-icon" id="dropIcon">📄</div>
      <div class="drop-text" id="dropText">Drop your PDF here or <strong>click to browse</strong></div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(this.files[0])"/>
  </div>

  <button class="btn-main" id="submitBtn" onclick="run()" disabled>✨ Add Project to GitHub</button>
  <div class="terminal" id="terminal" style="display:none"></div>
  <div class="preview" id="preview" style="display:none">
    <div class="preview-label">📋 Extracted from PDF</div>
    <div class="preview-title" id="previewTitle"></div>
    <div class="preview-desc" id="previewDesc"></div>
  </div>
  <div class="sites-result" id="resultsRow" style="display:none"></div>
  <p class="foot-note">🔒 Keys never stored · Card cloned from your site · Powered by Groq (free)</p>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const REPOS = {
  portfolio: { owner: 'muzakkirmd', repo: 'muzakkir-portfolio' },
  freelance: { owner: 'muzakkirmd', repo: 'muzakkir-freelance' },
};

let selectedSite = 'both';
let pdfFile = null;

function toggleSite(s) {
  selectedSite = s;
  document.querySelectorAll('.site-btn').forEach(b => b.classList.toggle('active', b.dataset.site === s));
  checkReady();
}

function checkReady() {
  const ok = pdfFile && document.getElementById('tokenInput').value && document.getElementById('groqKey').value;
  document.getElementById('submitBtn').disabled = !ok;
}

document.getElementById('tokenInput').addEventListener('input', checkReady);
document.getElementById('groqKey').addEventListener('input', checkReady);

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
}

function handleFile(f) {
  if (!f) return;
  pdfFile = f;
  document.getElementById('dropIcon').textContent = '✅';
  document.getElementById('dropText').innerHTML = `<strong>${f.name}</strong>`;
  document.getElementById('dropzone').classList.add('has-file');
  checkReady();
}

const terminal = document.getElementById('terminal');
function log(msg, type = 'info') {
  terminal.style.display = 'block';
  const now = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = document.createElement('div');
  d.className = 'log-line';
  d.innerHTML = `<span class="ts">${now}</span><span class="log-${type}">${msg}</span>`;
  terminal.appendChild(d);
  terminal.scrollTop = terminal.scrollHeight;
}

async function extractPDFText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(x => x.str).join(' ') + '\n';
  }
  return text.trim();
}

async function callGroq(groqKey, system, user) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      max_tokens: 1000,
      messages: [{ role: 'system', content: system }, { role: 'user', content: user }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || 'Groq API error');
  return data.choices[0].message.content;
}

async function fetchRepo(owner, repo, token) {
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/index.html`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
  });
  if (!r.ok) throw new Error(`Cannot fetch ${repo}: ${r.status}`);
  const d = await r.json();
  // Decode base64 properly preserving UTF-8 (emojis etc.)
  const binary = atob(d.content.replace(/\n/g,''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const html = new TextDecoder('utf-8').decode(bytes);
  return { sha: d.sha, html };
}

async function pushRepo(owner, repo, token, html, sha, title) {
  // Encode to base64 preserving UTF-8 (emojis etc.)
  const bytes = new TextEncoder().encode(html);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const encoded = btoa(binary);
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/index.html`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `Add project: ${title}`, content: encoded, sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
}

// ── CORE: Pure string injection — never parses/re-serializes the full HTML ────
function cloneAndInjectCard(html, title, description, tags) {

  // Step 1: Find projects section
  const sectionPatterns = [
    /id=["']projects["']/i,
    /id=["']portfolio["']/i,
    /class=["'][^"']*projects[^"']*["']/i,
  ];
  let sectionIdx = -1;
  for (const pat of sectionPatterns) {
    const m = html.search(pat);
    if (m !== -1) { sectionIdx = m; break; }
  }
  if (sectionIdx === -1) throw new Error('Could not find projects section');

  const htmlAfterSection = html.slice(sectionIdx);

  // Step 2: Find card opening tags
  const cardOpenPatterns = [
    /<div[^>]+class=["'][^"']*project-card[^"']*["'][^>]*>/gi,
    /<div[^>]+class=["'][^"']*tl-item[^"']*["'][^>]*>/gi,
    /<div[^>]+class=["'][^"']*card[^"']*["'][^>]*>/gi,
  ];
  let cardMatches = [];
  for (const pat of cardOpenPatterns) {
    const matches = [...htmlAfterSection.matchAll(pat)];
    if (matches.length > 0) { cardMatches = matches; break; }
  }
  if (cardMatches.length === 0) throw new Error('Could not find project cards to clone');

  const lastMatch = cardMatches[cardMatches.length - 1];
  const lastCardAbsStart = sectionIdx + lastMatch.index;

  // Step 3: Find where the last card ends by counting div depth
  let depth = 0;
  let i = lastCardAbsStart;
  let lastCardAbsEnd = -1;
  while (i < html.length) {
    if (html[i] === '<') {
      if (html.slice(i, i+2) === '</') {
        const closeEnd = html.indexOf('>', i);
        if (closeEnd === -1) break;
        if (depth === 1) { lastCardAbsEnd = closeEnd + 1; break; }
        depth--;
        i = closeEnd + 1;
      } else if (html.slice(i, i+4) !== '<!--') {
        const tagEnd = html.indexOf('>', i);
        if (tagEnd === -1) break;
        const tagContent = html.slice(i, tagEnd + 1);
        if (!tagContent.endsWith('/>')) depth++;
        i = tagEnd + 1;
      } else {
        const commentEnd = html.indexOf('-->', i);
        i = commentEnd === -1 ? html.length : commentEnd + 3;
      }
    } else { i++; }
  }
  if (lastCardAbsEnd === -1) throw new Error('Could not find end of last card');

  // Step 4: Clone last card as raw string
  let newCardStr = html.slice(lastCardAbsStart, lastCardAbsEnd);

  // Step 5: Replace title (h2/h3/h4)
  newCardStr = newCardStr.replace(
    /(<h[234][^>]*>)([\s\S]*?)(<\/h[234]>)/i,
    (_, open, _c, close) => open + title + close
  );

  // Step 6: Replace description (first <p>)
  newCardStr = newCardStr.replace(
    /(<p[^>]*>)([\s\S]*?)(<\/p>)/i,
    (_, open, _c, close) => open + description + close
  );

  // Step 7: Replace tags using string replacement
  if (tags.length > 0) {
    const tagPattern = /(<(?:span|div)[^>]*class=["'][^"']*(?:tag|tech|badge|skill|stack)[^"']*["'][^>]*>)([\s\S]*?)(<\/(?:span|div)>)/gi;
    const tagMatches = [...newCardStr.matchAll(tagPattern)];
    if (tagMatches.length > 0) {
      let tagIdx = 0;
      newCardStr = newCardStr.replace(tagPattern, (match, open, _c, close) => {
        if (tagIdx < tags.length) return open + tags[tagIdx++] + close;
        return '';
      });
      // Append extra tags if needed
      if (tagIdx < tags.length && tagMatches.length > 0) {
        const lastTagMatch = tagMatches[tagMatches.length - 1];
        const extra = tags.slice(tagIdx).map(tag =>
          lastTagMatch[1] + tag + lastTagMatch[3]
        ).join('');
        newCardStr = newCardStr.replace(/<\/div>\s*$/, extra + '</div>');
      }
    }
  }

  // Step 8: Inject right after last card — original HTML completely untouched
  const injection = `\n<!-- PROJECT-START: ${title} -->\n` + newCardStr + `\n<!-- PROJECT-END: ${title} -->\n`;
  return html.slice(0, lastCardAbsEnd) + injection + html.slice(lastCardAbsEnd);
}

async function run() {
  const token = document.getElementById('tokenInput').value.trim();
  const groqKey = document.getElementById('groqKey').value.trim();
  if (!token || !groqKey || !pdfFile) return;

  terminal.innerHTML = '';
  terminal.style.display = 'block';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('resultsRow').style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';
  btn.onclick = null;

  const results = {};

  try {
    // Step 1: Extract PDF text
    log('📄 Extracting PDF text...', 'info');
    const pdfText = await extractPDFText(pdfFile);
    log('✅ PDF text extracted!', 'success');

    // Step 2: Extract project info with Groq (small payload — just PDF text)
    log('🤖 Extracting project info with Groq...', 'ai');
    const extracted = await callGroq(
      groqKey,
      'Return ONLY raw JSON. No markdown, no backticks, no explanation.',
      `From this text extract: project title, 2-sentence description, and up to 4 tech tags.
Respond ONLY with: {"title":"...","description":"...","tags":["...","..."]}

TEXT:
${pdfText.substring(0, 2000)}`
    );

    let title, description, tags;
    try {
      const parsed = JSON.parse(extracted.replace(/```json|```/g,'').trim());
      title = parsed.title;
      description = parsed.description;
      tags = parsed.tags || [];
    } catch(e) {
      throw new Error('Could not parse project info from AI response');
    }

    log(`📋 "${title}"`, 'success');
    document.getElementById('preview').style.display = 'block';
    document.getElementById('previewTitle').textContent = title;
    document.getElementById('previewDesc').textContent = description;

    // Step 3: Process each repo
    const targets = selectedSite === 'both' ? ['portfolio','freelance'] : [selectedSite];

    for (const site of targets) {
      const { owner, repo } = REPOS[site];
      try {
        log(`📡 Fetching ${repo}...`, 'info');
        const { sha, html } = await fetchRepo(owner, repo, token);
        log(`✅ Fetched (${(html.length/1024).toFixed(0)}KB)`, 'success');

        log(`🎨 Cloning existing card structure...`, 'ai');
        const updatedHtml = cloneAndInjectCard(html, title, description, tags);
        log(`✅ Card cloned & injected!`, 'success');

        log(`🚀 Pushing to ${repo}...`, 'info');
        await pushRepo(owner, repo, token, updatedHtml, sha, title);
        log(`✅ Pushed to ${repo}!`, 'success');
        results[site] = 'ok';
      } catch(err) {
        log(`❌ ${site}: ${err.message}`, 'error');
        results[site] = 'fail';
      }
    }

    const row = document.getElementById('resultsRow');
    row.style.display = 'flex'; row.innerHTML = '';
    ['portfolio','freelance'].forEach(s => {
      const b = document.createElement('div');
      b.className = `site-result-badge ${results[s] || 'skip'}`;
      b.textContent = results[s]==='ok' ? `✅ ${s[0].toUpperCase()+s.slice(1)} Done`
                    : results[s]==='fail' ? `❌ ${s[0].toUpperCase()+s.slice(1)} Failed`
                    : `— ${s[0].toUpperCase()+s.slice(1)} Skipped`;
      row.appendChild(b);
    });

    const allOk = Object.values(results).every(v => v === 'ok');
    btn.className = 'btn-main' + (allOk ? ' success' : '');
    btn.innerHTML = allOk ? '🎉 Done! Add Another' : '⚠️ Retry';
    btn.disabled = false;
    btn.onclick = allOk ? resetForm : run;
    if (allOk) log('⏳ Sites rebuild in ~30s!', 'warn');

  } catch(err) {
    log(`❌ Fatal: ${err.message}`, 'error');
    btn.innerHTML = '✨ Add Project to GitHub';
    btn.disabled = false;
    btn.onclick = run;
  }
}

function resetForm() {
  pdfFile = null;
  document.getElementById('dropIcon').textContent = '📄';
  document.getElementById('dropText').innerHTML = 'Drop your PDF here or <strong>click to browse</strong>';
  document.getElementById('dropzone').classList.remove('has-file');
  document.getElementById('fileInput').value = '';
  document.getElementById('terminal').innerHTML = '';
  document.getElementById('terminal').style.display = 'none';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('resultsRow').style.display = 'none';
  document.getElementById('submitBtn').className = 'btn-main';
  document.getElementById('submitBtn').innerHTML = '✨ Add Project to GitHub';
  document.getElementById('submitBtn').onclick = run;
  checkReady();
}
</script>
</body>
</html>
